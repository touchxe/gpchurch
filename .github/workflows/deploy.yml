name: 🚀 Cafe24 자동 배포 (SSH Key)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH 배포 → Cafe24
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 받기
        uses: actions/checkout@v4

      - name: 🔑 SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: 📤 테마 배포 (rsync over SSH)
        run: |
          echo "=== gapyeong-church 배포 ==="
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.DS_Store' \
            --exclude 'node_modules/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./wp-content/themes/gapyeong-church/ \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}:www/wp-content/themes/gapyeong-church/

          echo "=== gapyeong-church-child 배포 ==="
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.DS_Store' \
            --exclude 'node_modules/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./wp-content/themes/gapyeong-church-child/ \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}:www/wp-content/themes/gapyeong-church-child/

          echo "✅ 배포 완료!"
