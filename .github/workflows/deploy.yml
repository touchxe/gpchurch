name: 🔍 FTP 기능 테스트

on:
  push:
    branches:
      - main

jobs:
  test:
    name: FTP 기능 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 받기
        uses: actions/checkout@v4

      - name: 🔍 FTP 전체 기능 테스트
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python3 scripts/ftp_test.py
