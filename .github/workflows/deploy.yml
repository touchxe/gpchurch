name: 🚀 Cafe24 자동 배포 (SFTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SFTP 배포 → Cafe24
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 받기
        uses: actions/checkout@v4

      - name: 🔍 SSH 인증 방식 확인
        run: |
          sudo apt-get install -y sshpass
          echo "=== SSH 인증 방식 확인 ==="
          ssh -v -o BatchMode=yes -o ConnectTimeout=5 \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} \
            echo "test" 2>&1 | grep -i "authentications"
          
          echo ""
          echo "=== 비밀번호 인증 시도 ==="
          sshpass -p "${{ secrets.FTP_PASS }}" \
            ssh -v -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} \
            "pwd && ls wp-content/themes/" 2>&1 | tail -20

          echo ""
          echo "=== keyboard-interactive 인증 시도 ==="
          sshpass -p "${{ secrets.FTP_PASS }}" \
            ssh -v -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=keyboard-interactive \
            -o PubkeyAuthentication=no \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} \
            "pwd && ls wp-content/themes/" 2>&1 | tail -20
        continue-on-error: true

      - name: 📤 sftp 직접 시도
        run: |
          echo "=== sftp 배치 모드 시도 ==="
          sshpass -p "${{ secrets.FTP_PASS }}" \
            sftp -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o PubkeyAuthentication=no \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} <<'EOF'
          pwd
          ls wp-content/themes/
          bye
          EOF
        continue-on-error: true
