name: 🚀 Cafe24 자동 배포 (SCP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SCP 배포 → Cafe24
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 받기
        uses: actions/checkout@v4

      - name: 🔑 SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🔍 SSH 키 검증 및 연결 테스트
        run: |
          echo "=== 키 파일 확인 ==="
          echo "첫 줄: $(head -1 ~/.ssh/deploy_key)"
          echo "마지막 줄: $(tail -1 ~/.ssh/deploy_key)"
          echo "줄 수: $(wc -l < ~/.ssh/deploy_key)"
          echo "바이트: $(wc -c < ~/.ssh/deploy_key)"
          
          echo ""
          echo "=== SSH 연결 테스트 ==="
          ssh -vvv -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} \
            "pwd" 2>&1 | grep -E "debug1|Authenticated|Permission|identity|sign_and_send|offering|Connection"

      - name: 📤 테마 배포 (scp)
        if: success()
        run: |
          SCP_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          TARGET="${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}"

          echo "=== gapyeong-church 배포 ==="
          scp -r $SCP_OPTS \
            ./wp-content/themes/gapyeong-church/* \
            ${TARGET}:www/wp-content/themes/gapyeong-church/

          echo "=== gapyeong-church-child 배포 ==="
          scp -r $SCP_OPTS \
            ./wp-content/themes/gapyeong-church-child/* \
            ${TARGET}:www/wp-content/themes/gapyeong-church-child/

          echo "✅ 배포 완료!"
