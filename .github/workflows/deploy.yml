name: 🚀 Cafe24 자동 배포

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP 배포 → Cafe24
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 받기
        uses: actions/checkout@v4

      - name: 📤 FTP 업로드 (Python)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python3 scripts/ftp_deploy.py
