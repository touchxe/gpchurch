name: 🚀 Cafe24 자동 배포

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP 배포 → Cafe24
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 받기
        uses: actions/checkout@v4

      - name: 📤 FTP 업로드 (Python)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 << 'EOF'
          import ftplib
          import os
          import sys

          HOST = os.environ['FTP_HOST']
          USER = os.environ['FTP_USER']
          PASS = os.environ['FTP_PASS']

          LOCAL_DIR = './wp-content/themes/'
          REMOTE_DIR = 'wp-content/themes/'

          SKIP = {'.git', '.DS_Store', 'node_modules', '__pycache__'}

          def ftp_mkdirs(ftp, path):
              parts = path.strip('/').split('/')
              current = ''
              for part in parts:
                  current = current + '/' + part if current else part
                  try:
                      ftp.mkd(current)
                      print(f'  📁 생성: {current}')
                  except ftplib.error_perm:
                      pass  # 이미 존재

          def upload_dir(ftp, local_path, remote_path):
              ftp_mkdirs(ftp, remote_path)
              for item in os.listdir(local_path):
                  if item in SKIP:
                      continue
                  local_item = os.path.join(local_path, item)
                  remote_item = remote_path + '/' + item
                  if os.path.isdir(local_item):
                      upload_dir(ftp, local_item, remote_item)
                  else:
                      try:
                          with open(local_item, 'rb') as f:
                              ftp.storbinary(f'STOR {remote_item}', f)
                          print(f'  ✅ 업로드: {remote_item}')
                      except Exception as e:
                          print(f'  ❌ 실패: {remote_item} → {e}')
                          sys.exit(1)

          print(f'🔌 FTP 연결 중: {HOST}')
          ftp = ftplib.FTP()
          ftp.connect(HOST, 21, timeout=30)
          ftp.login(USER, PASS)
          ftp.set_pasv(True)
          print(f'✅ 연결 성공 (홈: {ftp.pwd()})')

          upload_dir(ftp, LOCAL_DIR, REMOTE_DIR)

          ftp.quit()
          print('🎉 배포 완료!')
          EOF
