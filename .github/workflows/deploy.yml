name: 🚀 Cafe24 자동 배포

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP 배포 → Cafe24
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 받기
        uses: actions/checkout@v4

      - name: 📤 lftp로 테마 업로드
        run: |
          sudo apt-get install -y lftp
          lftp -e "
            set ftp:ssl-allow no;
            set mirror:parallel-transfer-count 5;
            open ftp://${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}@${{ secrets.FTP_HOST }};
            mirror --reverse --delete --verbose \
              --exclude .git/ \
              --exclude .DS_Store \
              --exclude node_modules/ \
              ./wp-content/themes/gapyeong-church/ \
              /www/wp-content/themes/gapyeong-church/;
            mirror --reverse --delete --verbose \
              --exclude .git/ \
              --exclude .DS_Store \
              --exclude node_modules/ \
              ./wp-content/themes/gapyeong-church-child/ \
              /www/wp-content/themes/gapyeong-church-child/;
            bye
          "
          echo "✅ 배포 완료!"
