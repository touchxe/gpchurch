name: 🚀 Cafe24 자동 배포 (SFTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SFTP 배포 → Cafe24
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 받기
        uses: actions/checkout@v4

      - name: 🔑 SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "=== 키 파일 검증 ==="
          head -1 ~/.ssh/deploy_key
          wc -l ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "키 형식 오류!"

      - name: 📦 paramiko 설치
        run: pip install paramiko

      - name: 📤 SFTP 배포
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
        run: python3 scripts/ftp_deploy.py
